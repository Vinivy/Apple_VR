<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <ul>
            <ion-icon id="Apple" name="logo-apple"></ion-icon>
            <li>Overview</li>
            <li>Guide Tour</li>
            <li>Tech Specs</li>
        </ul>
        <button id="Watch">Watch Tour</button>
    </header>
    <main>
        <h1>Apple Vision Pro <span>$3499</span></h1>
        <p>Welcome to the era of spatial computing</p>
        <img src="./Assets/VrApple.png" alt="" style="width: 50%;">
    </main>
    <button id="Toglle" onclick="SunDark()">
        
    </button>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

    <script>
        function SunDark() {
            let button = document.querySelector('#Toglle'); // Corrigido para selecionar o botão com o ID "Toggle"
            let webBody = document.querySelector('body');

                // Adiciona ou remove a classe 'Dark' com base no estado do botão
                if (!webBody.classList.contains('Dark')) {
                    webBody.classList.add('Dark');
                    button.innerHTML = '<ion-icon name="sunny-outline"></ion-icon> '
                } else {
                    webBody.classList.remove('Dark');
                    button.innerHTML = '<ion-icon name="moon-outline"></ion-icon>'
                }
            }
    </script>
</body>
</html>
